name: AI Service CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "ai-service/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "ai-service/**"
  workflow_dispatch:
    inputs:
      run_performance_tests:
        description: 'Run performance tests'
        required: false
        default: true
        type: boolean
      deploy_to_production:
        description: 'Deploy to production'
        required: false
        default: false
        type: boolean

jobs:
  test-ai-service:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11.9]
        os: [ubuntu-latest]
    
    steps:
      - name: Checkout AI Service Code
        uses: actions/checkout@v4
        with:
          path: ai-service
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install Dependencies
        run: |
          cd ai-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black mypy bandit safety
      
      - name: Run AI Service Tests
        run: |
          cd ai-service
          python -m pytest tests/ -v --cov=services --cov=routes --cov=models --cov=utils --cov-report=xml --cov-report=html
          python -m flake8 services/ routes/ models/ utils/ --max-line-length=100 --count
          python -m mypy services/ routes/ models/ utils/ --ignore-missing-imports
          python -m black --check services/ routes/ models/ utils/
      
      - name: Run Security Tests
        run: |
          cd ai-service
          safety check --json --output safety-report.json
          bandit -r services/ routes/ models/ utils/ -f json -o bandit-report.json
          pip-audit -r --output audit-report.json
      
      - name: Test AI Models Loading
        run: |
          cd ai-service
          python -c "
          from services.object_detection import ObjectDetectionService
          from services.face_recognition import FaceRecognitionService
          from services.pose_estimation import PoseEstimationService
          from services.emotion_detection import EmotionDetectionService
          from services.anomaly_detection import AnomalyDetectionService
          from services.camera_manager import CameraManager
          
          print('Testing AI models loading...')
          
          # Test object detection
          obj_det = ObjectDetectionService()
          obj_det.load_model()
          print('✅ Object detection model loaded')
          
          # Test face recognition
          face_rec = FaceRecognitionService()
          face_rec.load_known_faces()
          print('✅ Face recognition service loaded')
          
          # Test pose estimation
          pose_est = PoseEstimationService()
          pose_est.load_model()
          print('✅ Pose estimation model loaded')
          
          # Test emotion detection
          emotion_det = EmotionDetectionService()
          emotion_det.load_model()
          print('✅ Emotion detection model loaded')
          
          # Test anomaly detection
          anomaly_det = AnomalyDetectionService()
          print('✅ Anomaly detection service loaded')
          
          # Test camera manager
          cam_mgr = CameraManager()
          cameras = cam_mgr.scan_cameras()
          print(f'✅ Found {len(cameras)} cameras')
          
          print('🎉 All AI services loaded successfully!')
          "
      
      - name: Test API Endpoints
        run: |
          cd ai-service
          python -m uvicorn main:app --host 0.0.0.0 --port 8001 &
          sleep 5
          
          # Test health endpoint
          python -c "
          import requests
          response = requests.get('http://localhost:8001/health', timeout=10)
          print(f'Health check: {response.status_code}')
          assert response.status_code == 200
          "
          
          # Test camera management
          python -c "
          import requests
          response = requests.get('http://localhost:8001/api/cameras/scan', timeout=10)
          print(f'Camera scan: {response.status_code}')
          assert response.status_code == 200
          "
          
          # Test AI analysis
          python -c "
          import base64
          import requests
          
          # Create test frame (small base64)
          test_frame = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhf/KZoKTn2NQGAAABJRU5ErkJggg=='  # 1x1 pixel test image
          
          response = requests.post(
              'http://localhost:8001/api/advanced/analyze/comprehensive',
              json={
                  'camera_id': 'test',
                  'company_id': 'test',
                  'frame_base64': test_frame,
                  'confidence_threshold': 0.7,
                  'enable_face_recognition': True,
                  'enable_pose_estimation': True,
                  'enable_emotion_detection': True,
                  'enable_anomaly_detection': True
              },
              timeout=30
          )
          print(f'AI Analysis: {response.status_code}')
          assert response.status_code == 200
          "
          
          python -c "import uvicorn; uvicorn.main.stop()" 2>/dev/null || true
      
      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v4
        with:
          path: ai-service
          if: github.ref == 'refs/heads/main'
          with:
            flags: --continue-on-error
            files: coverage.xml
            fail_ci_if_error: true
      
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: ai-service/
        if: github.ref == 'refs/heads/main'

  build-and-deploy:
    needs: test-ai-service
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_production == 'true')
    environment:
      name: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AI Service Code
        uses: actions/checkout@v4
        with:
          path: ai-service
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11.9'
      
      - name: Install Dependencies
        run: |
          cd ai-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build AI Service
        run: |
          cd ai-service
          python -m py_compile services/ routes/ models/ utils/
      
      - name: Deploy to Production
        run: |
          echo "Deploying AI Service to production"
          # Add your Railway/Render deployment commands here
          curl -X POST -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
               https://api.railway.app/v2/projects/$RAILWAY_PROJECT_ID/services \
               -H "Content-Type: application/json" \
               -d '{
                 "serviceId": "'$RAILWAY_SERVICE_ID'",
                 "environment": "production",
                 "buildCommand": "pip install -r requirements.txt && python -m uvicorn main:app --host 0.0.0.0 --port $PORT",
                 "startCommand": "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
               }'
      
      - name: Health Check After Deployment
        timeout-minutes: 10
        run: |
          echo "Checking deployment health..."
          
          # Use environment variable for service URL with fallback
          SERVICE_URL="${{ secrets.SERVICE_URL || 'https://ai-workplace.railway.app' }}"
          HEALTH_ENDPOINT="$SERVICE_URL/health"
          
          echo "Pinging health endpoint: $HEALTH_ENDPOINT"
          
          # Wait for deployment to settle
          sleep 30
          
          # Retry mechanism with exponential backoff
          MAX_RETRIES=3
          RETRY_COUNT=0
          RETRY_DELAY=5
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Health check attempt $((RETRY_COUNT + 1))/$MAX_RETRIES..."
            
            if curl --retry 2 --retry-delay $RETRY_DELAY --max-time 30 -f "$HEALTH_ENDPOINT" >/dev/null 2>&1; then
              echo "✅ AI Service deployed successfully!"
              exit 0
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "❌ Health check failed, retrying in ${RETRY_DELAY} seconds..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))  # Exponential backoff
            fi
          done
          
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          echo "This may be due to:"
          echo "- Service is still starting up (cold start)"
          echo "- Service URL is incorrect: $HEALTH_ENDPOINT"
          echo "- Service is experiencing issues"
          echo ""
          echo "To fix this:"
          echo "1. Check if SERVICE_URL secret is set correctly"
          echo "2. Verify the service is deployed and accessible"
          echo "3. Check service logs for any startup errors"
          
          # Continue on error for non-critical health checks
          exit 1

  performance-test:
    needs: test-ai-service
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_performance_tests == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout AI Service Code
        uses: actions/checkout@v4
        with:
          path: ai-service
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11.9'
      
      - name: Install Dependencies
        run: |
          cd ai-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install locust pytest-benchmark
      
      - name: Run Performance Tests
        run: |
          cd ai-service
          
          # Start AI service
          python -m uvicorn main:app --host 0.0.0.0 --port 8002 &
          UVICORN_PID=$!
          
          # Wait for service to be ready
          echo "Waiting for AI service to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8002/health >/dev/null 2>&1; then
              echo "✅ AI service is ready after ${i} seconds"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ AI service failed to start within 30 seconds"
              kill $UVICORN_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          
          # Create performance test script
          cat > performance_test.py << 'EOF'
          import requests
          import time
          import base64
          from concurrent.futures import ThreadPoolExecutor, as_completed
          
          def test_endpoint(endpoint, data=None, method='GET'):
              start_time = time.time()
              url = f'http://localhost:8002{endpoint}'
              
              try:
                  if method.upper() == 'GET':
                      response = requests.get(url, timeout=30)
                  else:
                      response = requests.post(url, json=data or {}, timeout=30)
                  
                  end_time = time.time()
                  return {
                      'endpoint': endpoint,
                      'status_code': response.status_code,
                      'response_time': (end_time - start_time) * 1000,
                      'success': response.status_code == 200
                  }
              except Exception as e:
                  end_time = time.time()
                  return {
                      'endpoint': endpoint,
                      'status_code': 0,
                      'response_time': (end_time - start_time) * 1000,
                      'success': False,
                      'error': str(e)
                  }
          
          # Test frame
          test_frame = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhf/KZoKTn2NQGAAABJRU5ErkJggg=='
          
          # Performance tests with correct HTTP methods
          test_configs = [
              ('/health', None, 'GET'),
              ('/api/cameras/scan', None, 'GET'),
              ('/api/advanced/models/status', None, 'GET'),
              ('/api/face/status', None, 'GET'),
              ('/api/webcam/cameras', None, 'GET'),
              ('/api/advanced/analyze/comprehensive', {
                  'camera_id': 'test',
                  'company_id': 'test',
                  'frame_base64': test_frame,
                  'confidence_threshold': 0.7
              }, 'POST')
          ]
          
          # Run tests sequentially first to ensure they work
          results = []
          for endpoint, data, method in test_configs:
              result = test_endpoint(endpoint, data, method)
              results.append(result)
              print(f"{method} {endpoint}: {result['status_code']} ({result['response_time']:.2f}ms) {'✅' if result['success'] else '❌'}")
          
          # Then run concurrent tests for performance
          print("\nRunning concurrent performance tests...")
          with ThreadPoolExecutor(max_workers=5) as executor:
              future_to_config = {
                  executor.submit(test_endpoint, endpoint, data, method): (endpoint, data, method)
                  for endpoint, data, method in test_configs
              }
              concurrent_results = []
              for future in as_completed(future_to_config):
                  result = future.result()
                  concurrent_results.append(result)
          
          # Analyze results
          successful_tests = [r for r in results if r['success']]
          avg_response_time = sum(r['response_time'] for r in successful_tests) / len(successful_tests) if successful_tests else 0
          
          print(f"\nPerformance Test Results:")
          print(f"Successful Tests: {len(successful_tests)}/{len(results)}")
          print(f"Average Response Time: {avg_response_time:.2f}ms")
          
          if len(successful_tests) == len(results) and avg_response_time < 2000:  # Increased threshold to 2s
              print("✅ Performance tests passed!")
          else:
              print("❌ Performance tests failed!")
              if len(successful_tests) < len(results):
                  print(f"Failed endpoints: {[r['endpoint'] for r in results if not r['success']]}")
              if avg_response_time >= 2000:
                  print(f"Average response time too high: {avg_response_time:.2f}ms")
              exit(1)
          EOF
          
          python performance_test.py
          
          # Clean up
          kill $UVICORN_PID 2>/dev/null || true
          wait $UVICORN_PID 2>/dev/null || true
      
      - name: Upload Performance Reports
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: ai-service/performance_test.py
