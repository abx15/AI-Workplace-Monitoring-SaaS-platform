services:
  - type: web
    name: ai-workplace-monitor
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app/main.py"
    healthCheckPath: "/health"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AI_SERVICE_PORT
        value: 8000
      - key: AI_SERVICE_HOST
        value: 0.0.0.0
